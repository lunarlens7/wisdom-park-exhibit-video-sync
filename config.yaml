dry_run: false  # set to true to play videos without triggering any device cues

video:
  loop: true
  fullscreen: true
  screens:
    - path: "sunset_timelapse.mp4"
      window_title: "Screen 1"
      monitor: 1
      mute: false
    - path: "sunset_timelapse.mp4"
      window_title: "Screen 2"
      monitor: 2
      mute: true

devices:
  main_light:
    type: l530
    ip: "192.168.2.28"
    initial_state:
      on: true
      brightness: 80
      hue: 0
      saturation: 0

  secondary_light:
    type: l530
    ip: "192.168.2.30"
    initial_state:
      on: true
      brightness: 80
      hue: 0
      saturation: 0

  stage_switch:
    type: p100
    ip: "192.168.2.29"
    initial_state:
      on: false

cues:
  # lights start at 80% white and dim to near-off over the video
  - at: 1
    devices: [main_light, secondary_light]
    action: fade
    to_brightness: 5
    to_hue: 0
    to_saturation: 0
    duration: 22.0

  - at: 5
    devices: [stage_switch]
    action: "on"

  # lights and switch off at the end
  - at: 24
    devices: [main_light, secondary_light]
    action: "off"

  - at: 24
    devices: [stage_switch]
    action: "off"

dry_run: false  # set to true to play videos without triggering any device cues

video:
  loop: true
  fullscreen: true
  screens:
    - path: "sunset_timelapse.mp4"
      window_title: "Screen 1"
      monitor: 1
      mute: false
    - path: "moon.webp"
      window_title: "Screen 2"
      monitor: 2
      mute: true

devices:
  main_light:
    type: l530
    ip: "192.168.8.103"
    initial_state:
      on: true
      brightness: 80

  secondary_light:
    type: l530
    ip: "192.168.8.102"
    initial_state:
      on: true
      brightness: 80

  stage_switch:
    type: p100
    ip: "192.168.8.101"
    initial_state:
      on: false

cues:
  # lights start at 80% white and dim to near-off over the video
  - at: 5
    devices: [main_light, secondary_light]
    action: fade
    to_brightness: 1
    duration: 7

  - at: 12
    devices: [stage_switch]
    action: "on"

  # lights and switch off at the end
  - at: 20
    devices: [main_light, secondary_light]
    action: "off"

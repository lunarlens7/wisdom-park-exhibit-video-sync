dry_run: false  # set to true to play videos without triggering any device cues

video:
  loop: true
  fullscreen: true
  screens:
    - path: "sunset_timelapse.mp4"
      window_title: "Screen 1"
      monitor: 1
      mute: false
    - path: "sunset_timelapse.mp4"
      window_title: "Screen 2"
      monitor: 2
      mute: true

devices:
  main_light:
    type: l530
    ip: "192.168.2.28"
    initial_state:
      on: true
      brightness: 10
      hue: 30
      saturation: 80

  secondary_light:
    type: l530
    ip: "192.168.2.30"
    initial_state:
      on: true
      brightness: 10
      hue: 30
      saturation: 80

  stage_switch:
    type: p100
    ip: "192.168.2.29"
    initial_state:
      on: false

cues:
  - at: 5
    device: main_light
    action: fade
    to_brightness: 20
    to_hue: 200
    to_saturation: 100
    duration: 5.0

  - at: 5
    device: secondary_light
    action: fade
    to_brightness: 20
    to_hue: 200
    to_saturation: 100
    duration: 5.0

  - at: 10
    device: stage_switch
    action: "on"

  - at: 15
    device: main_light
    action: set_light
    brightness: 80
    hue: 120
    saturation: 60

  - at: 15
    device: secondary_light
    action: set_light
    brightness: 80
    hue: 120
    saturation: 60

  - at: 20
    device: stage_switch
    action: "off"
